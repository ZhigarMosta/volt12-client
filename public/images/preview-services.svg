<svg width="195" height="150" viewBox="0 0 260 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Услуги">
  <defs>
    <linearGradient id="svc-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ea0212"/>
      <stop offset="1" stop-color="#87040d"/>
    </linearGradient>
    <linearGradient id="svc-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3f46"/>
      <stop offset="1" stop-color="#1c1f24"/>
    </linearGradient>
  </defs>

  <!-- soft backdrop -->
  <circle cx="140" cy="100" r="86" fill="#eef0f2"/>

  <!-- big gear -->
  <g transform="translate(150 96)">
    <g fill="url(#svc-steel)">
      <circle r="52"/>
      <g>
        <rect x="-9" y="-66" width="18" height="20" rx="3"/>
        <rect x="-9" y="46" width="18" height="20" rx="3"/>
        <rect x="-66" y="-9" width="20" height="18" rx="3"/>
        <rect x="46" y="-9" width="20" height="18" rx="3"/>
      </g>
      <g transform="rotate(45)">
        <rect x="-9" y="-66" width="18" height="20" rx="3"/>
        <rect x="-9" y="46" width="18" height="20" rx="3"/>
        <rect x="-66" y="-9" width="20" height="18" rx="3"/>
        <rect x="46" y="-9" width="20" height="18" rx="3"/>
      </g>
    </g>
    <circle r="30" fill="#eef0f2"/>
    <circle r="18" fill="url(#svc-red)"/>
    <circle r="6" fill="#ffffff"/>
  </g>

  <!-- wrench crossing -->
  <g transform="translate(66 128) rotate(-38)">
    <rect x="-8" y="-52" width="16" height="86" rx="8" fill="url(#svc-red)"/>
    <path d="M-18 -52 a18 18 0 1 1 36 0 l-9 9 a9 9 0 0 1 -18 0 z" fill="url(#svc-red)"/>
    <circle cx="0" cy="-46" r="7" fill="#eef0f2"/>
  </g>
</svg>
